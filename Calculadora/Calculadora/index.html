<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Inteligente con Historial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="calculator">

        <h1>🧮 Calculadora Inteligente con Historial</h1>

        <div class="display">
            <div id="operation">0</div>
            <div id="result">0</div>
        </div>

        <div class="buttons">

            <button class="btn action" onclick="clearDisplay()">C</button>
            <button class="btn action" onclick="deleteLast()">⌫</button>
            <button class="btn operator" onclick="appendValue('/')">÷</button>
            <button class="btn operator" onclick="appendValue('*')">×</button>

            <button class="btn" onclick="appendValue('7')">7</button>
            <button class="btn" onclick="appendValue('8')">8</button>
            <button class="btn" onclick="appendValue('9')">9</button>
            <button class="btn operator" onclick="appendValue('-')">−</button>

            <button class="btn" onclick="appendValue('4')">4</button>
            <button class="btn" onclick="appendValue('5')">5</button>
            <button class="btn" onclick="appendValue('6')">6</button>
            <button class="btn operator" onclick="appendValue('+')">+</button>

            <button class="btn" onclick="appendValue('1')">1</button>
            <button class="btn" onclick="appendValue('2')">2</button>
            <button class="btn" onclick="appendValue('3')">3</button>
            <button class="btn equal" rowspan="2" onclick="calculate()">=</button>

            <button class="btn zero" onclick="appendValue('0')">0</button>
            <button class="btn" onclick="appendValue('.')">.</button>

        </div>

    </div>

    <div class="history-panel">

        <div class="history-header">
            <h2>📜 Historial</h2>
            <span id="count">0 operaciones</span>
        </div>

        <button class="clear-history" onclick="clearHistory()">
            Limpiar Historial
        </button>

        <div id="history"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
